[defaults]
# Ansible Configuration File

# Inventory
inventory = inventory/hosts.yml

# Roles path
roles_path = roles

# SSH settings
host_key_checking = False
# ec2-user is the default SSH user for Amazon Linux (which these roles
# target; every task uses the `yum` module, not `apt`).
remote_user = ec2-user
private_key_file = ~/.ssh/id_rsa

# Privilege escalation
become = True
become_method = sudo
become_user = root
become_ask_pass = False

# Output
stdout_callback = yaml
bin_ansible_callbacks = True

# Performance
forks = 10
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_fact_cache
fact_caching_timeout = 3600

# Logging
log_path = /tmp/ansible.log

# Vault
# Option 1 (file): copy vault.example.yml, encrypt it, then uncomment:
# vault_password_file = .vault_pass
# Option 2 (env var): export ANSIBLE_VAULT_PASSWORD_FILE=/path/to/.vault_pass
# Option 3 (prompt): run ansible-playbook with --ask-vault-pass

[privilege_escalation]
become = True
become_method = sudo
become_user = root

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
pipelining = True

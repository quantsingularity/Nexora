---
# roles/webserver/tasks/main.yml
#
# NOTE: this role installs and configures nginx as a reverse proxy + static
# file server (see templates/nginx.conf.j2), but does not install or start
# the actual Nexora backend process (code/backend, a Python/FastAPI app;
# see ../../../code/Dockerfile) that nginx proxies /api to on localhost:
# {{ app_port }}. Deploy that separately (e.g. via Docker, as in
# ../../docker-compose.yml) before relying on this host to serve real
# traffic.
- name: Install web server packages
  yum:
    name:
      - nginx
    state: present

- name: Create web application directory
  file:
    path: /var/www/{{ app_name }}
    state: directory
    owner: nginx
    group: nginx
    mode: "0755"

- name: Ensure nginx log directory exists
  file:
    path: /var/log/nginx
    state: directory
    owner: nginx
    group: adm
    mode: "0755"

- name: Configure Nginx rate limiting in main config
  lineinfile:
    path: /etc/nginx/nginx.conf
    insertafter: "http {"
    line: "    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;"
    state: present
  notify: Reload Nginx

- name: Configure Nginx virtual host
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/conf.d/{{ app_name }}.conf
    owner: root
    group: root
    mode: "0644"
    validate: nginx -t -c /etc/nginx/nginx.conf
  notify: Restart Nginx

- name: Remove default Nginx site
  file:
    path: /etc/nginx/conf.d/default.conf
    state: absent
  notify: Reload Nginx

- name: Start and enable Nginx
  systemd:
    name: nginx
    state: started
    enabled: yes

version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Nexora – docker-compose.override.yml
# Local development overrides. Applied automatically on top of docker-compose.yml.
# Do NOT commit secrets stored in .env to version control.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Gateway: expose on 8080 locally to avoid requiring root ──────────────
  nginx:
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/nexora-proxy.conf:ro

  # ── Frontend: run the Parcel dev server with hot-reload ──────────────────
  frontend:
    build:
      args:
        REACT_APP_API_BASE_URL: http://localhost:8080/api
    environment:
      - REACT_APP_API_BASE_URL=http://localhost:8080/api
    volumes:
      # Mount the real frontend source for hot reload (overrides the built
      # image content). An anonymous volume on node_modules keeps the
      # container's own install from being shadowed by the host's.
      - ../web-frontend:/app:delegated
      - /app/node_modules
    command:
      ["npx", "parcel", "src/index.html", "--port", "3000", "--host", "0.0.0.0"]
    ports:
      - "3000:3000"

  # ── Backend: mount source and run uvicorn with --reload ──────────────────
  backend:
    build:
      target: builder # includes build tools (gcc, etc.) useful for dev
    environment:
      - LOG_LEVEL=DEBUG
      - JWT_SECRET_KEY=dev-jwt-secret-not-for-production
    volumes:
      - ../code:/app:delegated
    command:
      [
        "uvicorn",
        "backend.serving.rest_api:app",
        "--reload",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    ports:
      - "8000:8000" # Direct access for debugging

version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Nexora – docker-compose.prod.yml
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  nginx:
    image: nexora/nginx:${APP_VERSION}
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt/live/${DOMAIN}/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/${DOMAIN}/privkey.pem:/etc/nginx/certs/privkey.pem:ro
      - nginx-logs:/var/log/nginx
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
        reservations:
          cpus: "0.10"
          memory: 64M

  frontend:
    image: nexora/frontend:${APP_VERSION}
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
        reservations:
          cpus: "0.05"
          memory: 32M

  backend:
    image: nexora/backend:${APP_VERSION}
    restart: always
    environment:
      - LOG_LEVEL=WARNING
    deploy:
      # The app persists accounts/patients to SQLite on a shared volume;
      # SQLite serializes concurrent writers via file locks, so running
      # more than one replica risks "database is locked" errors under
      # load. Scale by upgrading to a client-server database first.
      replicas: 1
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 512M

version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Nexora – docker-compose.yml
# Production-ready compose file. Use docker-compose.override.yml for local dev.
#
# Services:
#   nginx    – reverse proxy / gateway (routes /api/* to backend, / to frontend)
#   frontend – the React (Parcel) SPA in web-frontend/, served via nginx
#   backend  – the Python/FastAPI clinical prediction API in code/
#
# The backend is self-contained (SQLite for accounts/patients, local file
# volumes for models/artifacts/audit logs); there is no external database
# or cache service to run.
# ─────────────────────────────────────────────────────────────────────────────

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

x-restart: &default-restart
  restart: unless-stopped

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

networks:
  frontend-net:
    driver: bridge
    name: nexora-frontend-net
  backend-net:
    driver: bridge
    name: nexora-backend-net

volumes:
  nginx-logs:
    name: nexora-nginx-logs
  nexora-audit:
    name: nexora-audit
  nexora-data:
    name: nexora-data
  nexora-artifacts:
    name: nexora-artifacts
  nexora-models:
    name: nexora-models

services:
  # ── Gateway / Reverse Proxy ──────────────────────────────────────────────
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    image: nexora/nginx:${APP_VERSION:-latest}
    container_name: nexora-nginx
    <<: *default-restart
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    networks:
      - frontend-net
    volumes:
      - nginx-logs:/var/log/nginx
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/nexora-proxy.conf:ro
      # Mount TLS certs in production (bind-mount or secrets):
      # - /etc/letsencrypt/live/nexora.example.com:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M

  # ── Frontend (React SPA, built with Parcel) ──────────────────────────────
  frontend:
    build:
      context: ../web-frontend
      dockerfile: ../infrastructure/docker/frontend/Dockerfile
      args:
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-/api}
    image: nexora/frontend:${APP_VERSION:-latest}
    container_name: nexora-frontend
    <<: *default-restart
    networks:
      - frontend-net
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  # ── Backend (Python / FastAPI clinical prediction API) ───────────────────
  backend:
    build:
      context: ../code
      dockerfile: Dockerfile
      target: runtime
    image: nexora/backend:${APP_VERSION:-latest}
    container_name: nexora-backend
    <<: *default-restart
    networks:
      - frontend-net
      - backend-net
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - AUDIT_DB_PATH=/app/audit/phi_access.db
      - APP_DB_PATH=/app/data/nexora_app.db
      - FEATURE_STORE_PATH=/app/data/feature_store
      - ARTIFACT_STORE_PATH=/app/artifacts
      - FHIR_SERVER_URL=${FHIR_SERVER_URL:-http://mock-fhir-server/R4}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-10080}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    env_file:
      - .env
    volumes:
      - nexora-audit:/app/audit
      - nexora-data:/app/data
      - nexora-artifacts:/app/artifacts
      - nexora-models:/app/models
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      start_period: 20s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G

version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Nexora – docker-compose.yml
# Production-ready compose file. Use docker-compose.override.yml for local dev.
# ─────────────────────────────────────────────────────────────────────────────

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

x-restart: &default-restart
  restart: unless-stopped

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

networks:
  frontend-net:
    driver: bridge
    name: nexora-frontend-net
  backend-net:
    driver: bridge
    name: nexora-backend-net
  db-net:
    driver: bridge
    name: nexora-db-net
    internal: true # database network is never reachable from outside

volumes:
  mysql-data:
    name: nexora-mysql-data
  redis-data:
    name: nexora-redis-data
  nginx-logs:
    name: nexora-nginx-logs

services:
  # ── Gateway / Reverse Proxy ──────────────────────────────────────────────
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    image: nexora/nginx:${APP_VERSION:-latest}
    container_name: nexora-nginx
    <<: *default-restart
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    networks:
      - frontend-net
    volumes:
      - nginx-logs:/var/log/nginx
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/nexora-proxy.conf:ro
      # Mount TLS certs in production (bind-mount or secrets):
      # - /etc/letsencrypt/live/nexora.example.com:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M

  # ── Frontend (React SPA) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./docker/frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
        REACT_APP_ENV: ${APP_ENV:-production}
    image: nexora/frontend:${APP_VERSION:-latest}
    container_name: nexora-frontend
    <<: *default-restart
    networks:
      - frontend-net
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-/api}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  # ── Backend (Node.js API) ────────────────────────────────────────────────
  backend:
    build:
      context: ./docker/backend
      dockerfile: Dockerfile
    image: nexora/backend:${APP_VERSION:-latest}
    container_name: nexora-backend
    <<: *default-restart
    networks:
      - frontend-net
      - backend-net
    environment:
      - NODE_ENV=${APP_ENV:-production}
      - PORT=3000
      - DATABASE_URL=mysql://${DB_USER:-appuser}:${DB_PASSWORD}@mysql:3306/${DB_NAME:-nexoradb}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - API_KEY=${API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      start_period: 20s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M

  # ── MySQL 8 ──────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: nexora-mysql
    <<: *default-restart
    networks:
      - backend-net
      - db-net
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-nexoradb}
      MYSQL_USER: ${DB_USER:-appuser}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/nexora.cnf:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --innodb-buffer-pool-size=256M
      - --slow-query-log=ON
      - --slow-query-log-file=/var/log/mysql/slow.log
      - --long-query-time=2
      - --general-log=OFF
      - --bind-address=0.0.0.0
    healthcheck:
      <<: *healthcheck-defaults
      test:
        - "CMD"
        - "mysqladmin"
        - "ping"
        - "-h"
        - "localhost"
        - "-u"
        - "root"
        - "--password=${DB_ROOT_PASSWORD}"
      start_period: 40s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M

  # ── Redis 7 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexora-redis
    <<: *default-restart
    networks:
      - backend-net
    volumes:
      - redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "ping"]
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  # ── Database migrations (runs once, then exits) ──────────────────────────
  migrate:
    image: nexora/backend:${APP_VERSION:-latest}
    container_name: nexora-migrate
    networks:
      - backend-net
    environment:
      - DATABASE_URL=mysql://${DB_USER:-appuser}:${DB_PASSWORD}@mysql:3306/${DB_NAME:-nexoradb}
      - NODE_ENV=${APP_ENV:-production}
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    command: ["node", "dist/migrations/run.js"]
    restart: "no"
    logging: *default-logging

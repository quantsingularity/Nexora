apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Values.appName }}-backend"
  labels:
    app: "{{ .Values.appName }}-backend"
spec:
  replicas: { { .Values.backend.replicas } }
  selector:
    matchLabels:
      app: "{{ .Values.appName }}-backend"
  template:
    metadata:
      labels:
        app: "{{ .Values.appName }}-backend"
    spec:
      containers:
        - name: "{{ .Values.appName }}-backend"
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: "{{ .Values.backend.image.pullPolicy }}"
          ports:
            - containerPort: { { .Values.backend.containerPort } }
          resources:
            limits:
              cpu: "{{ .Values.backend.resources.limits.cpu }}"
              memory: "{{ .Values.backend.resources.limits.memory }}"
            requests:
              cpu: "{{ .Values.backend.resources.requests.cpu }}"
              memory: "{{ .Values.backend.resources.requests.memory }}"
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "{{ .Values.backend.containerPort }}"
            - name: AUDIT_DB_PATH
              value: "/app/audit/phi_access.db"
            - name: APP_DB_PATH
              value: "/app/data/nexora_app.db"
            - name: FEATURE_STORE_PATH
              value: "/app/data/feature_store"
            - name: ARTIFACT_STORE_PATH
              value: "/app/artifacts"
          envFrom:
            - configMapRef:
                name: "{{ .Values.appName }}-config"
            - secretRef:
                name: "{{ .Values.appName }}-secrets"
          volumeMounts:
            - name: audit
              mountPath: /app/audit
            - name: data
              mountPath: /app/data
            - name: artifacts
              mountPath: /app/artifacts
            - name: models
              mountPath: /app/models
          livenessProbe:
            httpGet:
              path: /health
              port: { { .Values.backend.containerPort } }
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: { { .Values.backend.containerPort } }
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        # Ephemeral by default (fine for a single-replica demo deployment;
        # see docker-compose.prod.yml notes on SQLite + multiple replicas).
        # Swap these for PersistentVolumeClaims for real persistence.
        - name: audit
          emptyDir: {}
        - name: data
          emptyDir: {}
        - name: artifacts
          emptyDir: {}
        - name: models
          emptyDir: {}
      imagePullSecrets:
        - name: "{{ .Values.imagePullSecrets }}"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Values.appName }}-frontend"
  labels:
    app: "{{ .Values.appName }}-frontend"
spec:
  replicas: { { .Values.frontend.replicas } }
  selector:
    matchLabels:
      app: "{{ .Values.appName }}-frontend"
  template:
    metadata:
      labels:
        app: "{{ .Values.appName }}-frontend"
    spec:
      containers:
        - name: "{{ .Values.appName }}-frontend"
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: "{{ .Values.frontend.image.pullPolicy }}"
          # NOTE: this is a static build (Parcel-built React SPA served by
          # nginx); REACT_APP_API_BASE_URL is compiled into the JS bundle
          # at `docker build` time (see docker/frontend/Dockerfile) and
          # cannot be changed by a runtime container env var here. Set
          # `.Values.frontend.apiUrl` as a Docker build-arg in CI instead.
          ports:
            - containerPort: { { .Values.frontend.containerPort } }
          resources:
            limits:
              cpu: "{{ .Values.frontend.resources.limits.cpu }}"
              memory: "{{ .Values.frontend.resources.limits.memory }}"
            requests:
              cpu: "{{ .Values.frontend.resources.requests.cpu }}"
              memory: "{{ .Values.frontend.resources.requests.memory }}"
          livenessProbe:
            httpGet:
              path: /health
              port: { { .Values.frontend.containerPort } }
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: { { .Values.frontend.containerPort } }
            initialDelaySeconds: 5
            periodSeconds: 5
      imagePullSecrets:
        - name: "{{ .Values.imagePullSecrets }}"

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ─────────────────────────────────────────────────────────────────────────────
# NOTE: The YAML files in this directory are Helm chart templates.
# To use them with kustomize directly, first render them with Helm:
#
#   helm template nexora ./kubernetes \
#     -f kubernetes/environments/dev/values.yaml \
#     --output-dir kubernetes/rendered/dev
#
# Then apply the rendered output:
#   kubectl apply -k kubernetes/rendered/dev
#
# For Helm-native workflow:
#   helm upgrade --install nexora ./kubernetes \
#     -f kubernetes/environments/dev/values.yaml \
#     -n nexora --create-namespace
# ─────────────────────────────────────────────────────────────────────────────

namespace: nexora

resources:
  - namespace.yaml
  - rbac.yaml
  - app-configmap.yaml
  - app-secrets.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  - database-statefulset.yaml
  - database-service.yaml
  - redis-deployment.yaml
  - redis-service.yaml
  - redis-pvc.yaml
  - ingress.yaml

commonLabels:
  app: nexora
  managedBy: kustomize

images:
  - name: backend-image
    newName: nexora/backend
    newTag: latest
  - name: frontend-image
    newName: nexora/frontend
    newTag: latest
  - name: mysql
    newName: mysql
    newTag: "8.0"
  - name: redis
    newName: redis
    newTag: "7-alpine"

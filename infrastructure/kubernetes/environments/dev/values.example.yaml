# values.example.yaml - Development Environment Configuration
# Copy this to values.yaml and customize for your environment

namespace: nexora-dev
appName: nexora
environment: dev

# Backend configuration (Python/FastAPI; see code/backend)
backend:
  replicas: 1
  image:
    repository: your-registry/nexora-backend
    tag: latest
    pullPolicy: IfNotPresent
  containerPort: 8000
  servicePort: 8000
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  fhirServerUrl: http://mock-fhir-server/R4
  jwtAlgorithm: HS256
  jwtExpireMinutes: 10080
  jwtSecretKey: "CHANGEME" # Use secret management

# Frontend configuration (React/Parcel; see web-frontend)
frontend:
  replicas: 1
  image:
    repository: your-registry/nexora-frontend
    tag: latest
    pullPolicy: IfNotPresent
  containerPort: 80
  servicePort: 80
  # NOTE: baked into the JS bundle at `docker build` time; must be passed
  # as a Docker build-arg in CI, has no effect as a runtime setting here.
  apiUrl: /api
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

# Ingress configuration
ingress:
  host: nexora-dev.local
  class: nginx
  sslRedirect: "false"
  certManager:
    issuer: letsencrypt-staging

# Image pull secrets (if using a private registry)
imagePullSecrets: ""
# imagePullSecrets: "regcred"

# General configuration
logLevel: DEBUG

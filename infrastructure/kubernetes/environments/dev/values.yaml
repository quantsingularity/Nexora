namespace: nexora
appName: nexora
environment: dev

# Backend configuration (Python/FastAPI; see code/backend)
backend:
  replicas: 2
  image:
    repository: registry.example.com/app/backend
    tag: latest
    pullPolicy: Always
  containerPort: 8000
  servicePort: 80
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi
  fhirServerUrl: http://mock-fhir-server/R4
  jwtAlgorithm: HS256
  jwtExpireMinutes: 10080
  jwtSecretKey: dev-jwt-secret-local-only

# Frontend configuration (React/Parcel; see web-frontend)
frontend:
  replicas: 2
  image:
    repository: registry.example.com/app/frontend
    tag: latest
    pullPolicy: Always
  containerPort: 80
  servicePort: 80
  # NOTE: baked into the JS bundle at `docker build` time (Parcel inlines
  # process.env.* references); this value must be passed as a Docker
  # build-arg in CI, it has no effect as a runtime setting here.
  apiUrl: /api
  service:
    type: ClusterIP
  resources:
    limits:
      cpu: 300m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Ingress configuration
ingress:
  host: dev.nexora.example.com
  class: nginx
  sslRedirect: "true"
  certManager:
    issuer: letsencrypt-staging

# General configuration
logLevel: DEBUG
imagePullSecrets: regcred

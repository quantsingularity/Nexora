namespace: nexora
appName: nexora
environment: prod

# Backend configuration (Python/FastAPI; see code/backend)
# NOTE: the backend persists accounts/patients to SQLite on a local volume.
# Keep replicas at 1 unless/until the app is upgraded to a client-server
# database; multiple replicas writing to separate SQLite files would give
# each pod an inconsistent view of the data (see docker-compose.prod.yml).
backend:
  replicas: 1
  image:
    repository: registry.example.com/app/backend
    tag: production
    pullPolicy: Always
  containerPort: 8000
  servicePort: 80
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 1000m
      memory: 1Gi
  fhirServerUrl: http://mock-fhir-server/R4
  jwtAlgorithm: HS256
  jwtExpireMinutes: 10080
  jwtSecretKey: CHANGE_ME_in_sealed_secret

# Frontend configuration (React/Parcel; see web-frontend)
frontend:
  replicas: 5
  image:
    repository: registry.example.com/app/frontend
    tag: production
    pullPolicy: Always
  containerPort: 80
  servicePort: 80
  # NOTE: baked into the JS bundle at `docker build` time; must be passed
  # as a Docker build-arg in CI, has no effect as a runtime setting here.
  apiUrl: /api
  service:
    type: ClusterIP
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi

# Ingress configuration
ingress:
  host: nexora.example.com
  class: nginx
  sslRedirect: "true"
  certManager:
    issuer: letsencrypt-prod

# General configuration
logLevel: WARNING
imagePullSecrets: regcred

namespace: nexora
appName: nexora
environment: staging

# code configuration
code:
  replicas: 3
  image:
    repository: registry.example.com/app/code
    tag: stable
    pullPolicy: Always
  containerPort: 3000
  servicePort: 80
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  apiUrl: http://app-code
  jwtSecret: CHANGE_ME_in_sealed_secret
  apiKey: CHANGE_ME_in_sealed_secret

# Frontend configuration
frontend:
  replicas: 3
  image:
    repository: registry.example.com/app/frontend
    tag: stable
    pullPolicy: Always
  containerPort: 80
  servicePort: 80
  apiUrl: /api
  service:
    type: ClusterIP
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

# Database configuration
database:
  replicas: 1
  image:
    repository: mysql
    tag: 8.0
    pullPolicy: IfNotPresent
  containerPort: 3306
  servicePort: 3306
  name: nexoradb
  user: appuser
  password: CHANGE_ME_use_sealed_secrets
  rootPassword: CHANGE_ME_use_sealed_secrets
  url: mysql://appuser:staging-password@app-database:3306/appdb
  storageClass: standard
  storage: 20Gi
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 1000m
      memory: 1Gi

# Redis configuration
redis:
  replicas: 2
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  containerPort: 6379
  servicePort: 6379
  storageClass: standard
  storage: 10Gi
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 512Mi

# Ingress configuration
ingress:
  host: staging.nexora.example.com
  class: nginx
  sslRedirect: "true"
  certManager:
    issuer: letsencrypt-staging

# General configuration
logLevel: info
imagePullSecrets: regcred

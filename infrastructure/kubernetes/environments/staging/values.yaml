namespace: nexora
appName: nexora
environment: staging

# Backend configuration (Python/FastAPI; see code/backend)
backend:
  replicas: 3
  image:
    repository: registry.example.com/app/backend
    tag: stable
    pullPolicy: Always
  containerPort: 8000
  servicePort: 80
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  fhirServerUrl: http://mock-fhir-server/R4
  jwtAlgorithm: HS256
  jwtExpireMinutes: 10080
  jwtSecretKey: CHANGE_ME_in_sealed_secret

# Frontend configuration (React/Parcel; see web-frontend)
frontend:
  replicas: 3
  image:
    repository: registry.example.com/app/frontend
    tag: stable
    pullPolicy: Always
  containerPort: 80
  servicePort: 80
  # NOTE: baked into the JS bundle at `docker build` time; must be passed
  # as a Docker build-arg in CI, has no effect as a runtime setting here.
  apiUrl: /api
  service:
    type: ClusterIP
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

# Ingress configuration
ingress:
  host: staging.nexora.example.com
  class: nginx
  sslRedirect: "true"
  certManager:
    issuer: letsencrypt-staging

# General configuration
logLevel: INFO
imagePullSecrets: regcred

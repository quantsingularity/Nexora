apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: "{{ .Values.appName }}-ingress"
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.ingress.class }}"
    nginx.ingress.kubernetes.io/ssl-redirect: "{{ .Values.ingress.sslRedirect }}"
    cert-manager.io/cluster-issuer: "{{ .Values.ingress.certManager.issuer }}"
    # The backend's FastAPI routes have no /api prefix (e.g. /auth/login,
    # not /api/auth/login), so strip it here before proxying, matching
    # docker/nginx/nginx.conf's `proxy_pass http://backend/;` behavior.
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  tls:
    - hosts:
        - "{{ .Values.ingress.host }}"
      secretName: "{{ .Values.appName }}-tls"
  rules:
    - host: "{{ .Values.ingress.host }}"
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: "{{ .Values.appName }}-backend"
                port:
                  number: { { .Values.backend.servicePort } }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: "{{ .Values.appName }}-frontend"
                port:
                  number: { { .Values.frontend.servicePort } }
